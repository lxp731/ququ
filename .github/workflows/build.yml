name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 rpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Node.js dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build renderer
        run: cd frontend && pnpm run build:renderer

      - name: Build AppImage
        run: cd frontend && npx electron-builder --linux --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/

      - name: Set artifact info
        id: artifact
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          ARTIFACT="ququ-v${VERSION}.AppImage"
          echo "artifact_name=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ququ-linux-AppImage
          path: frontend/dist/ququ-v*.AppImage
          retention-days: 7

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Node.js dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build renderer
        run: cd frontend && pnpm run build:renderer

      - name: Build Windows portable
        run: cd frontend && npx electron-builder --win portable --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ququ-windows-portable
          path: frontend/dist/ququ-v*.exe
          retention-days: 7

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ququ-linux-AppImage
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ququ-windows-portable
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ququ v${{ steps.version.outputs.version }}"
          body: |
            ## 蛐蛐 QuQu ${{ steps.version.outputs.version }}

            ### 下载
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🐧 Linux | `ququ-v${{ steps.version.outputs.version }}.AppImage` | AppImage（~120MB）|
            | 🪟 Windows | `ququ-v${{ steps.version.outputs.version }}.exe` | 免安装便携版 |

            ### 使用前准备（容器化后端）

            首次使用需启动 FunASR 后端容器，详见 [README](https://github.com/lxp731/ququ#readme)。

            ### 校验
            详见 `checksums.txt`

            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          files: |
            dist/ququ-v*.AppImage
            dist/ququ-v*.exe
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
