name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 rpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Node.js dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build renderer
        run: cd frontend && pnpm run build:renderer

      - name: Build AppImage
        run: cd frontend && npx electron-builder --linux --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/

      - name: Rename AppImage
        id: artifact
        run: |
          ARTIFACT=$(ls frontend/dist/*.AppImage 2>/dev/null || echo "")
          if [ -z "$ARTIFACT" ]; then
            echo "Error: AppImage not found"
            ls -la frontend/dist/ || true
            exit 1
          fi
          VERSION=$(node -p "require('./frontend/package.json').version")
          NEW_NAME="QuQu-${VERSION}.AppImage"
          mv "$ARTIFACT" "frontend/dist/${NEW_NAME}"
          echo "artifact_name=${NEW_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuQu-AppImage
          path: frontend/dist/QuQu-*.AppImage
          retention-days: 7

      - name: Generate SHA256 checksum
        run: |
          cd frontend/dist
          sha256sum *.AppImage > checksums.txt

      - name: Create / Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "QuQu ${{ steps.artifact.outputs.version }}"
          body: |
            ## 蛐蛐 QuQu ${{ steps.artifact.outputs.version }}

            ### 下载
            | 文件 | 说明 |
            |------|------|
            | `QuQu-*.AppImage` | Linux AppImage（~120MB，不含 Python） |

            ### 使用前准备（容器化后端）

            ```bash
            # 1. 安装 Podman
            # Arch: sudo pacman -S podman
            # Ubuntu: sudo apt install podman
            # macOS: brew install podman && podman machine init && podman machine start

            # 2. 克隆仓库获取 compose 文件
            git clone https://github.com/lxp731/ququ.git
            cd ququ

            # 3. 构建并启动后端容器
            podman compose up -d

            # 4. 首次运行会自动下载模型（~1.2GB），等待就绪
            podman compose logs -f

            # 5. 运行 AppImage
            ./QuQu-${{ steps.artifact.outputs.version }}.AppImage
            ```

            ### 校验
            详见 `checksums.txt`

            Generated with [Claude Code](https://claude.com/claude-code)
          files: |
            frontend/dist/QuQu-*.AppImage
            frontend/dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
