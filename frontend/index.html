<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蛐蛐 - 中文语音转文字</title>
  <style>
    body { margin: 0; padding: 0; background: #0f172a; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    #root { width: 100vw; height: 100vh; background: #0f172a; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
    .drag { -webkit-app-region: drag; }
    .no-drag { -webkit-app-region: no-drag; }
  </style>
</head>
<body>
  <div id="root">
    <!-- 加载指示器 — React 挂载后会替换掉 -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:#94a3b8;font-family:sans-serif;flex-direction:column;gap:12px">
      <div style="width:24px;height:24px;border:2px solid rgba(129,140,248,0.4);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      <span style="font-size:14px">蛐蛐 加载中...</span>
      <span id="api-status" style="font-size:11px;color:#64748b"></span>
    </div>
  </div>
  <script>
    // 检测 electronAPI 是否可用
    setTimeout(() => {
      var el = document.getElementById('api-status');
      if (el) {
        el.textContent = window.electronAPI ? 'Electron API ✓' : 'Electron API ✗ (浏览器模式)';
      }
    }, 500);
  </script>
  <script type="module" src="./src/main.jsx"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
